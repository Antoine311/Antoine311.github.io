<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>TEST 2 — CSS ANIMATION</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;}
  .card{background:#fff;width:800px;padding:80px;text-align:center;}
  h1{font-size:64px;margin-bottom:40px;color:#000;}
  .tag{display:inline-block;background:#eee;padding:8px 20px;border-radius:8px;font-size:22px;color:#888;margin-bottom:30px;letter-spacing:0.1em;}
  .info{font-size:28px;color:#666;margin-top:40px;line-height:1.6;}

  /* Barre de progression CSS pure */
  .bar-track{width:100%;height:60px;background:#eee;border-radius:12px;overflow:hidden;margin:30px 0;}
  .bar-fill{width:100%;height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e,#3b82f6);background-size:200% 100%;animation:slide 4s linear infinite;border-radius:12px;}
  @keyframes slide{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Carré qui tourne */
  .spin-box{width:100px;height:100px;background:#e74c3c;margin:40px auto;animation:spin 3s linear infinite;}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  .result{font-size:36px;padding:30px;margin:30px 0;font-weight:bold;background:#d5f5e3;color:#27ae60;border:6px solid #27ae60;}
</style>
</head>
<body>
<div class="card">
  <div class="tag">TEST 2 / 4</div>
  <h1>CSS ANIMATION</h1>
  <div class="result">SI TU VOIS CECI = HTML OK<br/>BARRE ANIMEE = CSS ANIMATION OK<br/>CARRE TOURNE = CSS ANIMATION OK</div>
  <div class="bar-track"><div class="bar-fill"></div></div>
  <div class="spin-box"></div>
  <div class="info">
    Si la barre et le carré sont figés :<br/>
    Carousel prend un snapshot statique<br/><br/>
    Si ils bougent :<br/>
    Carousel fait du rendu en direct
  </div>
</div>
</body>
</html>
