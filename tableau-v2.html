<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>Suivi Entrepôt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e8e9ed; --dim: #8b8fa3; --accent: #3b82f6;
    --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2.5vw; display: flex; flex-direction: column; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5vh; padding-bottom: 2vh; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .clock { font-family: 'JetBrains Mono', monospace; font-size: clamp(1rem, 2vw, 1.5rem); color: var(--dim); }
  .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 8px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .table-container { flex: 1; overflow: hidden; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #12141c; font-size: clamp(0.75rem, 1.6vw, 1.1rem); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); padding: 1.8vh 1.5vw; text-align: left; border-bottom: 2px solid var(--accent); }
  tbody td { font-size: clamp(0.85rem, 1.8vw, 1.3rem); padding: 1.6vh 1.5vw; border-bottom: 1px solid var(--border); }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
  tbody tr:last-child td { border-bottom: none; }

  .badge { display: inline-block; padding: 0.3em 0.8em; border-radius: 6px; font-size: 0.85em; font-weight: 600; }
  .badge-ok    { background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge-warn  { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-alert { background: rgba(239,68,68,0.15);  color: var(--red); }

  .footer { margin-top: 2vh; display: flex; justify-content: space-between; color: var(--dim); font-size: clamp(0.65rem, 1.2vw, 0.9rem); }
  .footer .ts { font-family: 'JetBrains Mono', monospace; }
  #error { display: none; text-align: center; padding: 4vh; color: var(--red); font-size: 1.2rem; }
</style>
</head>
<body>

<div class="header">
  <h1><span>▌</span>Suivi Entrepôt — Muret 2</h1>
  <div class="clock"><span class="live-dot"></span><span id="clock">--:--</span></div>
</div>

<div class="table-container">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="error">Erreur de chargement des données</div>
</div>

<div class="footer">
  <div id="count"></div>
  <div class="ts">Mise à jour : <span id="ts">--</span></div>
</div>

<script>
// ── Mots-clés → badge automatique ──
const BADGES = {
  'ok':       'badge-ok',
  'termin':   'badge-ok',
  'en cours': 'badge-warn',
  'partiel':  'badge-warn',
  'retard':   'badge-alert',
  'urgent':   'badge-alert',
  'alerte':   'badge-alert',
};

function badgeFor(val) {
  const low = String(val).toLowerCase();
  for (const [kw, cls] of Object.entries(BADGES)) {
    if (low.includes(kw)) return '<span class="badge ' + cls + '">' + val + '</span>';
  }
  return val;
}

function cell(val, isFirst) {
  return isFirst ? '<td><strong>' + val + '</strong></td>' : '<td>' + badgeFor(val) + '</td>';
}

async function load() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    const rows = await resp.json();
    if (!rows.length) { document.getElementById('error').style.display = 'block'; return; }

    // Auto-détection des colonnes via les clés du JSON
    const keys = Object.keys(rows[0]);

    document.getElementById('thead').innerHTML =
      '<tr>' + keys.map(function(k) { return '<th>' + k + '</th>'; }).join('') + '</tr>';

    document.getElementById('tbody').innerHTML =
      rows.map(function(row) {
        return '<tr>' + keys.map(function(k, i) { return cell(row[k] != null ? row[k] : '', i === 0); }).join('') + '</tr>';
      }).join('');

    document.getElementById('count').textContent = rows.length + ' lignes';
  } catch (e) {
    document.getElementById('error').style.display = 'block';
  }
}

function tick() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
  document.getElementById('ts').textContent = now.toLocaleDateString('fr-FR') + ' ' + h + ':' + m;
}

load();
tick();
setInterval(tick, 30000);
</script>
</body>
</html>
